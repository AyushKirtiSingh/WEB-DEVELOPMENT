<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        h1 {
            color: red;
            color: #0BEE0B;
            color: rgb(74, 34, 207);
            color: rgba(45, 56, 67, 0.1);
            color: hsl(130, 71%, 32%);
            background-color: #fff;
        }

    </style>
</head>
<body>
    <h1>Let's learn about colors</h1>
    <p>Colors can be represented in:</p>
    <ol>
        <li>Color Keywords</li>
        <li>Hex Color Code</li>
        <li>RGB</li>
        <li>RGBA</li>
        <li>HSL</li>
    </ol>
</body>
</html>
