<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            box-shadow: 10px 8px 12px 2px orange inset; 
            
        }

        .text-element {
            text-shadow: 12px 8px 2px yellow;
            outline: 2px solid black;
            border: 3px solid green;
            outline offset: 25px;
            border-radius : 8px;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Vitae eligendi dolorum repellat molestiae animi quasi, temporibus, non, corrupti sint necessitatibus possimus recusandae? Quaerat error omnis doloribus voluptates laboriosam, molestiae cum.
    </p>
</body>
</html>
