<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element selector */
        /* div{
            background-color: red;
        } */
        
        /* Class selector */
        .red{
            background-color: red;
        }

        /* ID selector */
        #green{
            background-color: red;
        }

        /* Child selector */
        div > p{
            background-color: brown;
            color: blue;
        }

        /* Descendent selector */
        div p{
            background-color: brown;
            color: blue;
        }

        /* Universal selector */
        *{
            margin: 0;
            padding: 0;
        }

        /* Pseudo selectors */
        a:visited{
            color: yellow;
        }

        a:link{
            color: green;
        }

        a:hover{
            background-color: yellow;
        }

        a:active{
            background-color: red;
        }

        p:first-child{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <main class="one">
        <p>I am first</p>
        <p>I am second</p>
    </main>
    <div class="red">
        <article>
            <p>I am a para inside div</p>
        </article>
        I am a div
    </div>

    <div id="green">
        i am another para indide div 
    </div>
    <a href="https://www.google.com">Go to google</a>
    <a href="https://www.facebook2.com">Go to facebook</a>


</body>
</html>
